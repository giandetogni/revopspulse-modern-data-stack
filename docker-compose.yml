services:
  postgres:
    image: postgres:16-alpine
    container_name: revopspulse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-revopspulse}
      POSTGRES_USER: ${POSTGRES_USER:-revopspulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revopspulse}
    ports:
      - "5432:5432"
    volumes:
      - revopspulse_postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-crm-api:
    image: python:3.12-slim
    container_name: revopspulse-mock-crm-api
    working_dir: /app
    command: python src/api_mock/mock_crm_api.py
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:3.1.0-python3.12
    container_name: revopspulse-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER:-revopspulse}:${POSTGRES_PASSWORD:-revopspulse}@postgres:5432/airflow"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW_API_JWT_SECRET:-revopspulse_local_jwt_secret_change_me}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW_API_SECRET_KEY:-revopspulse_local_secret_key_change_me}"
    volumes:
      - .:/opt/airflow/project
      - ./requirements.txt:/requirements.txt
    command: >
      bash -c "pip install --no-cache-dir -r /requirements.txt &&
               airflow db migrate"

  airflow-webserver:
    image: apache/airflow:3.1.0-python3.12
    container_name: revopspulse-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER:-revopspulse}:${POSTGRES_PASSWORD:-revopspulse}@postgres:5432/airflow"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW_API_JWT_SECRET:-revopspulse_local_jwt_secret_change_me}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW_API_SECRET_KEY:-revopspulse_local_secret_key_change_me}"
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/airflow/project
      - ./requirements.txt:/requirements.txt
    command: >
      bash -c "pip install --no-cache-dir -r /requirements.txt &&
               airflow api-server"

  airflow-dag-processor:
    image: apache/airflow:3.1.0-python3.12
    container_name: revopspulse-airflow-dag-processor
    depends_on:
      postgres:
        condition: service_healthy
      mock-crm-api:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER:-revopspulse}:${POSTGRES_PASSWORD:-revopspulse}@postgres:5432/airflow"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW_API_JWT_SECRET:-revopspulse_local_jwt_secret_change_me}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW_API_SECRET_KEY:-revopspulse_local_secret_key_change_me}"
    volumes:
      - .:/opt/airflow/project
      - ./requirements.txt:/requirements.txt
    command: >
      bash -c "pip install --no-cache-dir -r /requirements.txt &&
               airflow dag-processor"

  airflow-scheduler:
    image: apache/airflow:3.1.0-python3.12
    container_name: revopspulse-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      mock-crm-api:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER:-revopspulse}:${POSTGRES_PASSWORD:-revopspulse}@postgres:5432/airflow"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW_API_JWT_SECRET:-revopspulse_local_jwt_secret_change_me}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW_API_SECRET_KEY:-revopspulse_local_secret_key_change_me}"
    volumes:
      - .:/opt/airflow/project
      - ./requirements.txt:/requirements.txt
    command: >
      bash -c "pip install --no-cache-dir -r /requirements.txt &&
               airflow scheduler"

volumes:
  revopspulse_postgres_data:
