version: 2

sources:
  - name: postgres_source
    description: Synthetic SaaS OLTP source tables used by RevOpsPulse.
    database: revopspulse
    schema: source
    tables:
      - name: accounts
        loaded_at_field: updated_at
      - name: customers
        loaded_at_field: updated_at
      - name: plans
      - name: subscriptions
        loaded_at_field: updated_at
      - name: invoices
        loaded_at_field: updated_at
      - name: payments
        loaded_at_field: created_at
      - name: refunds
        loaded_at_field: created_at
      - name: sales_reps
      - name: sales_targets
        loaded_at_field: created_at
