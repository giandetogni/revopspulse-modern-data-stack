version: 2

models:
  - name: stg_api__campaigns
    description: One row per marketing campaign from the mock CRM API.
    columns:
      - name: campaign_id
        tests:
          - not_null
          - unique
      - name: channel
        tests:
          - not_null
      - name: start_date
        tests:
          - not_null

  - name: stg_api__leads
    description: One row per lead from the mock CRM API.
    columns:
      - name: lead_id
        tests:
          - not_null
          - unique
      - name: campaign_id
        tests:
          - not_null
      - name: lead_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['new', 'contacted', 'qualified', 'converted', 'disqualified']

  - name: stg_api__marketing_spend
    description: One row per campaign spend record from the mock CRM API.
    columns:
      - name: spend_id
        tests:
          - not_null
          - unique
      - name: campaign_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null

  - name: stg_api__opportunities
    description: One row per CRM opportunity from the mock CRM API.
    columns:
      - name: opportunity_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null
      - name: sales_rep_id
        tests:
          - not_null
      - name: opportunity_stage
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['prospecting', 'qualified', 'proposal', 'closed_won', 'closed_lost']
