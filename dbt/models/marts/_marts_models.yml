version: 2

models:
  - name: dim_accounts
    description: Account dimension for SaaS customer analytics.
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
      - name: account_name
        tests:
          - not_null

  - name: dim_customers
    description: Customer dimension linked to accounts.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null

  - name: dim_sales_reps
    description: Sales representative dimension.
    columns:
      - name: sales_rep_id
        tests:
          - not_null
          - unique

  - name: fact_payments
    description: Payment fact table with refund-adjusted net paid amount.
    tests:
      - refund_not_greater_than_payment:
          arguments:
            refund_amount_column: refunded_amount
            payment_amount_column: payment_amount
          config:
            severity: warn
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null
      - name: net_paid_amount
        tests:
          - not_null
          - amount_non_negative:
              config:
                severity: warn

  - name: fact_opportunities
    description: CRM opportunity fact table enriched with sales and marketing context.
    columns:
      - name: opportunity_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null
      - name: opportunity_stage
        tests:
          - not_null

  - name: fact_product_events
    description: Incremental product event fact table.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null
      - name: event_timestamp
        tests:
          - not_null
          - event_timestamp_not_future
