version: 2

models:
  - name: dim_accounts
    description: Account dimension for SaaS customer analytics.
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
      - name: account_name
        tests:
          - not_null

  - name: dim_customers
    description: Customer dimension linked to accounts.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null

  - name: dim_sales_reps
    description: Sales representative dimension.
    columns:
      - name: sales_rep_id
        tests:
          - not_null
          - unique

  - name: fact_payments
    description: Payment fact table with refund-adjusted net paid amount.
    tests:
      - refund_not_greater_than_payment:
          arguments:
            refund_amount_column: refunded_amount
            payment_amount_column: payment_amount
          config:
            severity: warn
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null
      - name: net_paid_amount
        tests:
          - not_null
          - amount_non_negative:
              config:
                severity: warn

  - name: fact_opportunities
    description: CRM opportunity fact table enriched with sales and marketing context.
    columns:
      - name: opportunity_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null
      - name: opportunity_stage
        tests:
          - not_null

  - name: fact_product_events
    description: Incremental product event fact table.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: account_id
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null
      - name: event_timestamp
        tests:
          - not_null
          - event_timestamp_not_future

  - name: mart_data_quality_summary
    description: Data quality summary mart with business impact for key dbt checks.
    columns:
      - name: run_date
        tests:
          - not_null
      - name: source_name
        tests:
          - not_null
      - name: model_name
        tests:
          - not_null
      - name: test_name
        tests:
          - not_null
      - name: severity
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['warn', 'error']
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pass', 'warn', 'fail']
      - name: failed_records
        tests:
          - not_null
      - name: total_records
        tests:
          - not_null
      - name: failure_rate
        tests:
          - not_null
      - name: business_impact
        tests:
          - not_null
      - name: created_at
        tests:
          - not_null

  - name: mart_revenue_monthly
    description: Monthly SaaS revenue, payment quality, MRR, ARR, churn and logo retention metrics.
    columns:
      - name: metric_month
        tests:
          - not_null
          - unique
      - name: gross_revenue
        tests:
          - not_null
          - amount_non_negative
      - name: net_revenue
        tests:
          - not_null
      - name: mrr
        tests:
          - not_null
          - amount_non_negative
      - name: arr
        tests:
          - not_null
          - amount_non_negative
      - name: active_accounts
        tests:
          - not_null
      - name: churned_accounts
        tests:
          - not_null
      - name: payment_failure_rate
        tests:
          - not_null
      - name: refund_rate
        tests:
          - not_null
      - name: churn_rate
        tests:
          - not_null
      - name: logo_retention_rate
        tests:
          - not_null
      - name: created_at
        tests:
          - not_null

  - name: mart_product_usage_daily
    description: Daily product usage, activation, adoption and inactivity metrics by account activity.
    columns:
      - name: usage_date
        tests:
          - not_null
          - unique
      - name: total_events
        tests:
          - not_null
      - name: active_accounts
        tests:
          - not_null
      - name: inactive_accounts
        tests:
          - not_null
      - name: active_users
        tests:
          - not_null
      - name: activated_accounts
        tests:
          - not_null
      - name: core_feature_accounts
        tests:
          - not_null
      - name: activation_rate
        tests:
          - not_null
      - name: core_feature_adoption_rate
        tests:
          - not_null
      - name: report_export_adoption_rate
        tests:
          - not_null
      - name: cancellation_intent_rate
        tests:
          - not_null
      - name: created_at
        tests:
          - not_null

  - name: mart_marketing_roi_monthly
    description: Monthly marketing ROI, CAC, cost per lead and funnel conversion metrics by campaign.
    columns:
      - name: metric_month
        tests:
          - not_null
      - name: campaign_id
        tests:
          - not_null
      - name: campaign_name
        tests:
          - not_null
      - name: channel
        tests:
          - not_null
      - name: marketing_spend
        tests:
          - not_null
          - amount_non_negative
      - name: leads_count
        tests:
          - not_null
      - name: opportunities_count
        tests:
          - not_null
      - name: closed_won_opportunities
        tests:
          - not_null
      - name: closed_won_revenue
        tests:
          - not_null
      - name: cost_per_lead
        tests:
          - not_null
      - name: cac
        tests:
          - not_null
      - name: lead_to_opportunity_conversion_rate
        tests:
          - not_null
      - name: lead_to_closed_won_rate
        tests:
          - not_null
      - name: marketing_roi
        tests:
          - not_null
      - name: created_at
        tests:
          - not_null
